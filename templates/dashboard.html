<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Monitoring Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #0f1629 0%, #1a1a3e 100%);
            border-bottom: 1px solid #2a2a5a;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
        }

        header h1 span { color: #3b82f6; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.online { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-badge.offline { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .online .status-dot { background: #22c55e; }
        .offline .status-dot { background: #ef4444; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        main { padding: 30px 40px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.3s;
        }

        .stat-card:hover { border-color: #3b82f6; }

        .stat-card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card.total .value { color: #3b82f6; }
        .stat-card.phone .value { color: #f59e0b; }
        .stat-card.drowsy .value { color: #ef4444; }
        .stat-card.yawn .value { color: #8b5cf6; }
        .stat-card.other .value { color: #06b6d4; }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title button {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .section-title button:hover {
            background: #374151;
            color: #fff;
        }

        .chart-container {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            height: 220px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }

        .chart-bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .chart-bar {
            width: 100%;
            max-width: 40px;
            border-radius: 4px 4px 0 0;
            min-height: 2px;
            transition: height 0.5s ease;
        }

        .chart-label {
            font-size: 10px;
            color: #6b7280;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            max-height: 60px;
            overflow: hidden;
        }

        .alerts-table {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            overflow: hidden;
        }

        .alerts-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .alerts-table th {
            text-align: left;
            padding: 14px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            background: #0d1117;
            border-bottom: 1px solid #1f2937;
        }

        .alerts-table td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid #1f2937;
        }

        .alerts-table tr:last-child td { border-bottom: none; }

        .alerts-table tr:hover { background: #1a2234; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.phone { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .badge.drowsy { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .badge.yawn { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
        .badge.distraction { background: rgba(6, 182, 212, 0.15); color: #06b6d4; }

        .confidence-bar {
            width: 80px;
            height: 6px;
            background: #1f2937;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #4b5563;
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

        @media (max-width: 768px) {
            header { padding: 16px 20px; flex-direction: column; gap: 10px; }
            main { padding: 20px 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card .value { font-size: 24px; }
            .chart-container { height: 160px; }
        }
    </style>
</head>
<body>
    <header>
        <h1><span>&#9673;</span> Driver Monitoring <span>Dashboard</span></h1>
        <div id="statusBadge" class="status-badge offline">
            <div class="status-dot"></div>
            <span id="statusText">Offline</span>
        </div>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="label">Total de Alertas</div>
                <div class="value" id="totalAlerts">0</div>
            </div>
            <div class="stat-card phone">
                <div class="label">Uso de Celular</div>
                <div class="value" id="phoneAlerts">0</div>
            </div>
            <div class="stat-card drowsy">
                <div class="label">Sonolência</div>
                <div class="value" id="drowsyAlerts">0</div>
            </div>
            <div class="stat-card yawn">
                <div class="label">Bocejos</div>
                <div class="value" id="yawnAlerts">0</div>
            </div>
            <div class="stat-card other">
                <div class="label">Outras Distrações</div>
                <div class="value" id="otherAlerts">0</div>
            </div>
        </div>

        <div class="section-title">
            Distribuição de Alertas
        </div>
        <div class="chart-container" id="chart"></div>

        <div class="section-title">
            Histórico de Alertas
            <button onclick="clearAlerts()">Limpar Histórico</button>
        </div>
        <div class="alerts-table">
            <table>
                <thead>
                    <tr>
                        <th>Horário</th>
                        <th>Tipo</th>
                        <th>Classe</th>
                        <th>Confiança</th>
                    </tr>
                </thead>
                <tbody id="alertsBody">
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <div class="icon">&#128663;</div>
                                <p>Nenhum alerta registrado ainda.<br>Inicie o sistema de monitoramento.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;

        function getConfidenceColor(conf) {
            if (conf >= 90) return '#ef4444';
            if (conf >= 75) return '#f59e0b';
            return '#22c55e';
        }

        function getBadgeClass(type) {
            const map = { phone: 'phone', drowsy: 'drowsy', yawn: 'yawn' };
            return map[type] || 'distraction';
        }

        function getTypeLabel(type) {
            const map = {
                phone: 'Celular',
                drowsy: 'Sonolência',
                yawn: 'Bocejo',
                distraction: 'Distração'
            };
            return map[type] || type;
        }

        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats`);
                const data = await res.json();

                document.getElementById('totalAlerts').textContent = data.total_alerts;
                document.getElementById('phoneAlerts').textContent = data.phone_alerts;
                document.getElementById('drowsyAlerts').textContent = data.drowsy_alerts;
                document.getElementById('yawnAlerts').textContent = data.yawn_alerts;
                document.getElementById('otherAlerts').textContent = data.distraction_alerts;

                const badge = document.getElementById('statusBadge');
                const statusText = document.getElementById('statusText');

                // Consider online if updated in last 30 seconds
                if (data.last_update) {
                    const lastUpdate = new Date(data.last_update);
                    const now = new Date();
                    const diffSec = (now - lastUpdate) / 1000;

                    if (diffSec < 30 && data.last_status !== 'offline') {
                        badge.className = 'status-badge online';
                        statusText.textContent = 'Online - Monitorando';
                    } else {
                        badge.className = 'status-badge offline';
                        statusText.textContent = 'Offline';
                    }
                }

                // Update chart
                updateChart(data);
            } catch (e) {
                console.error('Stats fetch error:', e);
            }
        }

        function updateChart(data) {
            const chart = document.getElementById('chart');
            const categories = [
                { label: 'Celular', value: data.phone_alerts, color: '#f59e0b' },
                { label: 'Sonolência', value: data.drowsy_alerts, color: '#ef4444' },
                { label: 'Bocejos', value: data.yawn_alerts, color: '#8b5cf6' },
                { label: 'Outras', value: data.distraction_alerts, color: '#06b6d4' },
            ];

            const maxVal = Math.max(...categories.map(c => c.value), 1);

            chart.innerHTML = categories.map(c => {
                const height = Math.max(2, (c.value / maxVal) * 160);
                return `
                    <div class="chart-bar-group">
                        <div style="font-size:13px;color:${c.color};font-weight:600;margin-bottom:4px">
                            ${c.value}
                        </div>
                        <div class="chart-bar" style="height:${height}px;background:${c.color}"></div>
                        <div style="font-size:11px;color:#6b7280;margin-top:8px;text-align:center">
                            ${c.label}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchAlerts() {
            try {
                const res = await fetch(`${API_BASE}/api/alerts?limit=50`);
                const data = await res.json();

                const tbody = document.getElementById('alertsBody');

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="4">
                            <div class="empty-state">
                                <div class="icon">&#128663;</div>
                                <p>Nenhum alerta registrado ainda.<br>Inicie o sistema de monitoramento.</p>
                            </div>
                        </td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(a => `
                    <tr>
                        <td>${a.timestamp}</td>
                        <td><span class="badge ${getBadgeClass(a.type)}">${getTypeLabel(a.type)}</span></td>
                        <td>${a.class || '-'}</td>
                        <td>
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width:${a.confidence}%;background:${getConfidenceColor(a.confidence)}"></div>
                            </div>
                            ${a.confidence.toFixed(1)}%
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Alerts fetch error:', e);
            }
        }

        async function clearAlerts() {
            if (!confirm('Limpar todo o histórico de alertas?')) return;
            try {
                await fetch(`${API_BASE}/api/clear`, { method: 'POST' });
                fetchStats();
                fetchAlerts();
            } catch (e) {
                console.error('Clear error:', e);
            }
        }

        // Auto-refresh every 3 seconds
        fetchStats();
        fetchAlerts();
        setInterval(() => { fetchStats(); fetchAlerts(); }, 3000);
    </script>
</body>
</html>
